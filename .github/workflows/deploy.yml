name: Deploy to Railway

on:
  push:
    branches: [main]

env:
  RAILWAY_PROJECT_ID: 8c67cb03-6ad1-40ef-8cfc-47bf2954a1ed

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link --project 8c67cb03-6ad1-40ef-8cfc-47bf2954a1ed --environment production
          railway up --service backend --detach

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy worker
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link --project 8c67cb03-6ad1-40ef-8cfc-47bf2954a1ed --environment production
          cp railway-worker.json railway.json
          railway up --service worker --detach

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link --project 8c67cb03-6ad1-40ef-8cfc-47bf2954a1ed --environment production
          cp railway-frontend.json railway.json
          railway up --service frontend --detach
